<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Leque</title>
    <script defer src="./range-view.js"></script>
    <style>
      :root {
        --sand: #f7efe1;
        --amber: #f59e0b;
        --burnt: #b45309;
        --ink: #1f2937;
        --muted: #64748b;
        --panel: rgba(255, 252, 245, 0.96);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(245, 158, 11, 0.2), transparent 24%),
          radial-gradient(circle at bottom right, rgba(34, 121, 94, 0.18), transparent 28%),
          linear-gradient(145deg, #fbf5ea 0%, #ead0a2 100%);
      }

      .window-shell {
        width: min(1040px, calc(100% - 32px));
        margin: 24px auto;
        padding: 24px;
        border-radius: 28px;
        background: var(--panel);
        border: 1px solid rgba(180, 83, 9, 0.14);
        box-shadow: 0 24px 80px rgba(49, 38, 29, 0.16);
      }

      .window-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
      }

      .kicker {
        margin: 0 0 6px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.78rem;
        color: var(--burnt);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 3.4vw, 3rem);
        line-height: 1;
      }

      .spot-copy {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.6;
        max-width: 58ch;
      }

      .current-hand {
        min-width: 160px;
        padding: 14px 18px;
        border-radius: 22px;
        text-align: center;
        background: linear-gradient(180deg, #fff5d8, #fde68a);
        color: #7c2d12;
        box-shadow: inset 0 0 0 1px rgba(180, 83, 9, 0.16);
      }

      .current-hand span {
        display: block;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .current-hand strong {
        display: block;
        margin-top: 8px;
        font-size: 2rem;
      }

      .legend {
        margin-top: 20px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .filter-bar {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .filter-field {
        display: grid;
        gap: 6px;
      }

      .filter-field span {
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
      }

      .filter-field select {
        width: 100%;
        border-radius: 16px;
        border: 1px solid rgba(31, 41, 51, 0.08);
        padding: 13px 15px;
        font: inherit;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.86);
      }

      .window-actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .window-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 170px;
        padding: 12px 16px;
        border: 0;
        border-radius: 16px;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        color: #fffdf8;
        background: linear-gradient(135deg, #2f4f4f, #475569);
      }

      .legend-pill {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(31, 41, 51, 0.08);
        font-size: 0.92rem;
      }

      .legend-pill.raise {
        color: #7c2d12;
        background: rgba(245, 158, 11, 0.18);
      }

      .legend-pill.call {
        color: #1d4ed8;
        background: rgba(147, 197, 253, 0.24);
      }

      .legend-pill.fold {
        color: #475569;
      }

      .legend-pill.current {
        color: #166534;
        background: rgba(187, 247, 208, 0.45);
      }

      .range-grid {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(13, minmax(0, 1fr));
        gap: 6px;
      }

      .range-cell {
        aspect-ratio: 1;
        border-radius: 12px;
        display: grid;
        place-items: center;
        padding: 4px;
        text-align: center;
        font-size: 0.95rem;
        font-weight: 700;
        border: 1px solid rgba(31, 41, 51, 0.08);
        background: rgba(241, 245, 249, 0.72);
        color: #1f2937;
      }

      .range-cell.raise {
        background: linear-gradient(180deg, rgba(251, 191, 36, 0.92), rgba(234, 88, 12, 0.92));
        color: #fffaf3;
      }

      .range-cell.call {
        background: linear-gradient(180deg, rgba(147, 197, 253, 0.95), rgba(59, 130, 246, 0.92));
        color: #eff6ff;
      }

      .range-cell.current {
        box-shadow: inset 0 0 0 2px #166534, 0 0 0 2px rgba(187, 247, 208, 0.58);
        transform: scale(1.02);
      }

      .empty-state {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.6;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .window-shell {
          width: min(100% - 16px, 1040px);
          margin: 8px auto;
          padding: 16px;
          border-radius: 22px;
        }

        .window-header {
          display: grid;
          grid-template-columns: 1fr;
        }

        .current-hand {
          min-width: 0;
        }

        .range-grid {
          gap: 4px;
        }

        .range-cell {
          font-size: 0.72rem;
          border-radius: 8px;
        }

        .filter-bar {
          grid-template-columns: 1fr;
        }

        .window-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .window-action {
          width: 100%;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="window-shell" id="rangeViewerRoot">
      <p class="empty-state">Carregando leque do spot...</p>
    </main>
  </body>
</html>
